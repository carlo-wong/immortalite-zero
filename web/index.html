<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Immortalite Zero — Analysis</title>
<style>
  :root {
    --bg: #161512; --panel: #262421; --light: #f0d9b5; --dark: #b58863;
    --accent: #759900; --text: #bababa; --text-bright: #e8e6e3;
    --best: #3692e7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px; gap: 12px; min-height: 100vh;
  }
  .main { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  h1 { font-size: 18px; color: var(--text-bright); margin: 0 0 12px; font-weight: 600; }
  .left { display: flex; gap: 10px; }
  .evalbar {
    width: 22px; height: 480px; background: #4d4d4d; border-radius: 3px;
    overflow: hidden; position: relative; display: flex; flex-direction: column-reverse;
  }
  .evalbar .white { background: #f7f7f7; width: 100%; transition: height .3s ease; }
  .evalbar .num {
    position: absolute; width: 100%; text-align: center; font-size: 10px;
    color: #111; top: 4px; font-weight: 700; z-index: 2;
  }
  .evalbar.untrained .white { opacity: 0.55; }
  .board-wrap { position: relative; width: 480px; height: 480px; touch-action: none; }
  .board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); }
  .sq {
    width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
    font-size: 44px; cursor: pointer; user-select: none; position: relative;
  }
  .sq.light { background: var(--light); } .sq.dark { background: var(--dark); }
  .sq.sel { box-shadow: inset 0 0 0 4px rgba(155,199,0,.8); }
  .sq.last-move { background-color: rgba(155,199,0,.35) !important; }
  .sq.in-check { box-shadow: inset 0 0 0 4px rgba(255,0,0,.65); }
  .sq.dest:not(.dest-capture)::after {
    content: ""; position: absolute; width: 20px; height: 20px;
    background: var(--accent); opacity: 0.45; border-radius: 50%;
    pointer-events: none; z-index: 1;
  }
  .sq.dest-capture::after {
    content: ""; position: absolute; top: 50%; left: 50%;
    width: 48px; height: 48px; transform: translate(-50%, -50%);
    border-radius: 50%; background: transparent;
    box-shadow: 0 0 0 5px rgba(117, 153, 0, 0.55);
    pointer-events: none; z-index: 1;
  }
  .sq.dest-capture .piece { position: relative; z-index: 2; }
  .sq .coord { position: absolute; font-size: 9px; pointer-events: none; }
  .sq.light .coord { color: rgba(0,0,0,.45); }
  .sq.dark .coord { color: rgba(255,255,255,.5); }
  .sq .coord.file { bottom: 1px; right: 2px; }
  .sq .coord.rank { top: 1px; left: 2px; }
  .piece { cursor: grab; touch-action: none; }
  .piece:active { cursor: grabbing; }
  .piece.dragging { opacity: 0; }
  .piece.w { color: #fff; text-shadow: 0 0 2px #000, 0 1px 2px #000; }
  .piece.b { color: #000; text-shadow: 0 0 1px #888; }
  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 200;
    font-size: 52px; line-height: 1;
    transform: translate(-50%, calc(-50% - 6px));
    filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.45));
    cursor: grabbing; user-select: none;
  }
  .drag-ghost.w { color: #fff; text-shadow: 0 0 2px #000, 0 1px 2px #000; }
  .drag-ghost.b { color: #000; text-shadow: 0 0 1px #888; }
  svg.arrows { position: absolute; top: 0; left: 0; width: 480px; height: 480px; pointer-events: none; }
  .panel { background: var(--panel); border-radius: 6px; padding: 16px; width: 320px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  button { background: var(--accent); color: #fff; border: none; padding: 7px 12px;
        border-radius: 4px; cursor: pointer; font-size: 13px; }
  button.secondary { background: #3a3835; }
  button.active-style { outline: 2px solid var(--accent); }
  textarea, input[type=text] { width: 100%; background: #1b1a17; color: var(--text-bright);
        border: 1px solid #3a3835; border-radius: 4px; padding: 6px; font-family: monospace; font-size: 12px; }
  label { font-size: 12px; }
  .eval-line {
    padding: 7px 8px; border-radius: 4px; background: #1f1e1b; margin-bottom: 6px;
    font-size: 13px; cursor: pointer; transition: background .15s;
  }
  .eval-line:hover { background: #2a2926; }
  .eval-line.selected { outline: 1px solid var(--accent); }
  .eval-line.dim { opacity: 0.45; }
  .eval-line .mv { color: var(--text-bright); font-weight: 600; font-family: monospace; }
  .eval-line .cp { float: right; font-family: monospace; }
  .eval-line .pv { display: block; color: #8c8c8c; font-size: 11px; font-family: monospace; margin-top: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .moves { font-family: monospace; font-size: 13px; line-height: 1.7; max-height: 120px; overflow-y: auto; }
  .moves .m { cursor: pointer; padding: 0 3px; border-radius: 3px; }
  .moves .m.active { background: var(--accent); color: #fff; }
  .legend { font-size: 11px; margin-top: 6px; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin: 0 4px 0 10px; }
  .status { font-size: 11px; color: #888; margin-top: 8px; min-height: 14px; }
  .footer {
    font-size: 11px; color: #666; text-align: center; max-width: 860px; line-height: 1.5;
  }
  h2 { font-size: 13px; color: var(--text-bright); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: .5px; }
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
    align-items: center; justify-content: center; z-index: 100; pointer-events: none;
  }
  .modal-backdrop.open { display: flex; pointer-events: auto; }
  .modal {
    background: var(--panel); border-radius: 8px; padding: 16px 20px; text-align: center;
  }
  .modal h3 { margin: 0 0 12px; color: var(--text-bright); font-size: 14px; }
  .promo-btns { display: flex; gap: 10px; justify-content: center; }
  .promo-btns button { font-size: 28px; min-width: 52px; padding: 8px; }
</style>
</head>
<body>
  <div class="main">
    <div class="left">
      <div class="evalbar" id="evalBar"><div class="num" id="evalNum">0.0</div><div class="white" id="evalWhite" style="height:50%"></div></div>
      <div class="board-wrap" id="boardWrap">
        <div class="board" id="board"></div>
        <svg class="arrows" id="arrows" viewBox="0 0 480 480"></svg>
      </div>
    </div>

    <div class="panel">
      <h1>Immortalite Zero — Analysis</h1>
      <div class="row">
        <button id="flip" class="secondary" title="Flip board (F)">Flip</button>
        <button id="reset" class="secondary">Start pos</button>
        <button id="prev" class="secondary" title="Previous move (←)">◀</button>
        <button id="next" class="secondary" title="Next move (→)">▶</button>
      </div>
      <div class="row">
        <label>Sims <input type="text" id="sims" value="200" style="width:50px" /></label>
        <button id="analyze" title="Analyze (A)">Analyze</button>
      </div>

      <h2>Candidate lines</h2>
      <div id="lines"></div>
      <div class="legend">
        <span class="dot" style="background:var(--best)"></span>best
      </div>

      <h2>Moves</h2>
      <div class="moves" id="moves"></div>

      <h2>Import PGN / FEN</h2>
      <textarea id="importBox" rows="3" placeholder="Paste a PGN game or a FEN string..."></textarea>
      <div class="row" style="margin-top:6px">
        <button id="loadBtn">Load</button>
      </div>

      <h2>Live PGN / FEN</h2>
      <textarea id="pgnOut" rows="3" readonly></textarea>
      <div class="row" style="margin-top:6px">
        <input type="text" id="fenOut" readonly />
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="footer" id="footer">Connecting…</div>

  <div class="modal-backdrop" id="promoModal">
    <div class="modal">
      <h3>Promote to</h3>
      <div class="promo-btns" id="promoBtns"></div>
    </div>
  </div>

<script type="module">
import { Chess } from "./chess.js";

const API = "/analyze";
const START_FEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
const UNICODE = { p:"♟", n:"♞", b:"♝", r:"♜", q:"♛", k:"♚" };
const ANALYZE_DEBOUNCE_MS = 350;

let game = new Chess();
let startFen = START_FEN;
let allMoves = [];
let ply = 0;
let orientation = "w";
let selected = null;
let lastAnalysis = null;
let analyzeSeq = 0;
let analyzeTimer = null;
let selectedLineIdx = 0;
let lastMove = null;
let dragFrom = null;
let dragMoved = false;
let dragGhost = null;
let serverHealth = null;
let pendingPromo = null;

const $ = id => document.getElementById(id);

function isLivePosition() { return ply === allMoves.length; }

function rebuildGame() {
  game = new Chess();
  if (startFen !== START_FEN) game.load(startFen);
  for (let i = 0; i < ply; i++) game.move(allMoves[i]);
}

function pushMove(san) {
  allMoves = allMoves.slice(0, ply);
  allMoves.push(san);
  ply = allMoves.length;
  rebuildGame();
}

function initFromStart() {
  startFen = START_FEN;
  allMoves = [];
  ply = 0;
  game = new Chess();
  selected = null;
  lastMove = null;
  lastAnalysis = null;
  selectedLineIdx = 0;
  render();
  scheduleAnalyze();
}

function loadFromChess(temp) {
  const hdr = temp.header();
  startFen = hdr.FEN || START_FEN;
  allMoves = temp.history();
  ply = allMoves.length;
  selected = null;
  lastMove = ply > 0 ? { san: allMoves[ply - 1] } : null;
  lastAnalysis = null;
  selectedLineIdx = 0;
  rebuildGame();
  render();
  scheduleAnalyze();
}

function parseImport(text) {
  const trimmed = text.trim();
  if (!trimmed) throw new Error("empty");

  const fenLike = /^([rnbqkpRNBQKP1-8]+\/[rnbqkpRNBQKP1-8\/]+\s+[wb]\s+[KQkq-]+\s+[a-h3-6-]+\s+\d+\s+\d+)/;
  const firstLine = trimmed.split(/\r?\n/).find(l => l.trim() && !/^\[/.test(l.trim()))?.trim() || trimmed;
  if (fenLike.test(firstLine) && !/\d\.\s/.test(trimmed)) {
    const g = new Chess();
    g.load(firstLine);
    startFen = g.fen();
    allMoves = [];
    ply = 0;
    selected = null;
    lastMove = null;
    lastAnalysis = null;
    selectedLineIdx = 0;
    rebuildGame();
    render();
    scheduleAnalyze();
    return;
  }

  const g = new Chess();
  g.loadPgn(trimmed);
  loadFromChess(g);
}

function squareName(fileIdx, rankIdx) {
  const file = orientation === "w" ? fileIdx : 7 - fileIdx;
  const rank = orientation === "w" ? 7 - rankIdx : rankIdx;
  return "abcdefgh"[file] + (rank + 1);
}

function moveSquares(san) {
  const g = new Chess();
  if (startFen !== START_FEN) g.load(startFen);
  for (let i = 0; i < ply - 1; i++) g.move(allMoves[i]);
  const mv = g.move(san);
  return mv ? { from: mv.from, to: mv.to } : null;
}

function render() {
  const board = $("board");
  board.innerHTML = "";
  const pos = game.board();
  let checkSq = null;
  if (game.inCheck()) {
    const b = game.board();
    const turn = game.turn();
    for (let ri = 0; ri < 8; ri++) {
      for (let fi = 0; fi < 8; fi++) {
        const p = b[ri][fi];
        if (p && p.type === "k" && p.color === turn) {
          const rank = 8 - ri;
          checkSq = "abcdefgh"[fi] + rank;
          break;
        }
      }
      if (checkSq) break;
    }
  }
  const lastSq = lastMove && ply > 0 ? moveSquares(allMoves[ply - 1]) : null;

  for (let r = 0; r < 8; r++) {
    for (let f = 0; f < 8; f++) {
      const sq = document.createElement("div");
      const name = squareName(f, r);
      const fileIdx = orientation === "w" ? f : 7 - f;
      const rankIdx = orientation === "w" ? 7 - r : r;
      const isLight = (fileIdx + rankIdx) % 2 === 1;
      sq.className = "sq " + (isLight ? "light" : "dark");
      sq.dataset.square = name;
      if (lastSq && (name === lastSq.from || name === lastSq.to)) sq.classList.add("last-move");
      if (name === checkSq) sq.classList.add("in-check");

      const piece = pos[7 - rankIdx][fileIdx];
      if (piece) {
        const span = document.createElement("span");
        span.className = "piece " + piece.color + (dragFrom === name ? " dragging" : "");
        span.textContent = UNICODE[piece.type];
        span.dataset.square = name;
        sq.appendChild(span);
      }

      if (f === 0) {
        const rankCoord = document.createElement("span");
        rankCoord.className = "coord rank";
        rankCoord.textContent = String(orientation === "w" ? 8 - r : r + 1);
        sq.appendChild(rankCoord);
      }
      if (r === 7) {
        const fileCoord = document.createElement("span");
        fileCoord.className = "coord file";
        fileCoord.textContent = "abcdefgh"[orientation === "w" ? f : 7 - f];
        sq.appendChild(fileCoord);
      }

      if (selected === name) sq.classList.add("sel");
      const active = selected || dragFrom;
      if (active && isLivePosition()) {
        const legal = game.moves({ square: active, verbose: true });
        const mv = legal.find(m => m.to === name);
        if (mv) {
          sq.classList.add("dest");
          if (mv.captured) sq.classList.add("dest-capture");
        }
      }

      sq.onmousedown = e => onSquareDown(name, e);
      sq.onclick = () => onSquareClick(name);
      board.appendChild(sq);
    }
  }

  updateSelectionHighlight();

  $("fenOut").value = game.fen();
  $("pgnOut").value = buildPgn();
  renderMoves();
  drawArrows();
  updateGameOverUi();
}

function buildPgn() {
  if (allMoves.length === 0 && startFen === START_FEN) return game.pgn();
  const g = new Chess();
  if (startFen !== START_FEN) g.load(startFen);
  for (const san of allMoves) g.move(san);
  return g.pgn();
}

function updateSelectionHighlight() {
  const active = selected || dragFrom;
  document.querySelectorAll("#board .sq").forEach(sq => {
    const name = sq.dataset.square;
    sq.classList.remove("sel", "dest", "dest-capture");
    if (selected === name) sq.classList.add("sel");
    if (active && isLivePosition()) {
      const legal = game.moves({ square: active, verbose: true });
      const mv = legal.find(m => m.to === name);
      if (mv) {
        sq.classList.add("dest");
        if (mv.captured) sq.classList.add("dest-capture");
      }
    }
    const pieceSpan = sq.querySelector(".piece");
    if (pieceSpan) pieceSpan.classList.toggle("dragging", dragFrom === name);
  });
}

function createDragGhost(piece, x, y) {
  removeDragGhost();
  dragGhost = document.createElement("span");
  dragGhost.className = "drag-ghost " + piece.color;
  dragGhost.textContent = UNICODE[piece.type];
  dragGhost.style.left = x + "px";
  dragGhost.style.top = y + "px";
  document.body.appendChild(dragGhost);
}

function removeDragGhost() {
  if (dragGhost) {
    dragGhost.remove();
    dragGhost = null;
  }
}

function onSquareDown(name, e) {
  if (!isLivePosition() || game.isGameOver()) return;
  e.preventDefault();
  const piece = game.get(name);
  if (piece && piece.color === game.turn()) {
    dragFrom = name;
    dragMoved = false;
    createDragGhost(piece, e.clientX, e.clientY);
    updateSelectionHighlight();
  }
}

function onDocumentMouseMove(e) {
  if (!dragGhost) return;
  dragGhost.style.left = e.clientX + "px";
  dragGhost.style.top = e.clientY + "px";
}

function onDocumentMouseUp(e) {
  removeDragGhost();
  if (!dragFrom || !isLivePosition() || game.isGameOver()) {
    dragFrom = null;
    updateSelectionHighlight();
    return;
  }
  const from = dragFrom;
  dragFrom = null;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const to = el?.closest?.(".sq[data-square]")?.dataset?.square;
  if (to && to !== from) {
    tryMove(from, to);
    dragMoved = false;
    return;
  }
  updateSelectionHighlight();
}

function onSquareClick(name) {
  if (!isLivePosition() || game.isGameOver()) return;
  if (dragMoved) { dragMoved = false; return; }
  if (selected && selected !== name) {
    tryMove(selected, name);
    return;
  }
  const piece = game.get(name);
  if (piece && piece.color === game.turn()) {
    selected = selected === name ? null : name;
  } else {
    selected = null;
  }
  updateSelectionHighlight();
}

function tryMove(from, to, promotion) {
  const legal = game.moves({ square: from, verbose: true });
  const mv = legal.find(m => m.to === to);
  if (!mv) { selected = null; render(); return; }
  if (mv.promotion && !promotion) {
    pendingPromo = { from, to };
    showPromoModal(mv.promotion);
    return;
  }
  const played = game.move({ from, to, promotion: promotion || mv.promotion || undefined });
  if (!played) return;
  selected = null;
  lastMove = played;
  pushMove(played.san);
  render();
  scheduleAnalyze();
}

function showPromoModal(defaultPiece) {
  const pieces = ["q", "r", "b", "n"];
  const box = $("promoBtns");
  box.innerHTML = "";
  for (const p of pieces) {
    const btn = document.createElement("button");
    btn.textContent = UNICODE[p];
    btn.className = "secondary";
    btn.onclick = () => {
      $("promoModal").classList.remove("open");
      const { from, to } = pendingPromo;
      pendingPromo = null;
      tryMove(from, to, p);
    };
    box.appendChild(btn);
  }
  $("promoModal").classList.add("open");
}

function renderMoves() {
  const box = $("moves");
  box.innerHTML = "";
  for (let i = 0; i < allMoves.length; i++) {
    if (i % 2 === 0) box.appendChild(document.createTextNode(`${Math.floor(i / 2) + 1}. `));
    const span = document.createElement("span");
    span.className = "m" + (i + 1 === ply ? " active" : "");
    span.textContent = allMoves[i] + " ";
    span.onclick = () => goTo(i + 1);
    box.appendChild(span);
  }
}

function goTo(targetPly) {
  targetPly = Math.max(0, Math.min(allMoves.length, targetPly));
  ply = targetPly;
  selected = null;
  dragFrom = null;
  dragMoved = false;
  removeDragGhost();
  lastMove = ply > 0 ? { san: allMoves[ply - 1] } : null;
  rebuildGame();
  render();
  scheduleAnalyze();
}

function squareToXY(sq) {
  const file = "abcdefgh".indexOf(sq[0]);
  const rank = parseInt(sq[1], 10) - 1;
  const x = orientation === "w" ? file : 7 - file;
  const y = orientation === "w" ? 7 - rank : rank;
  return { cx: x * 60 + 30, cy: y * 60 + 30 };
}

function drawArrow(svg, from, to, color, markerId, width = 8) {
  const a = squareToXY(from), b = squareToXY(to);
  const ns = "http://www.w3.org/2000/svg";
  const line = document.createElementNS(ns, "line");
  line.setAttribute("x1", a.cx); line.setAttribute("y1", a.cy);
  line.setAttribute("x2", b.cx); line.setAttribute("y2", b.cy);
  line.setAttribute("stroke", color); line.setAttribute("stroke-width", String(width));
  line.setAttribute("stroke-linecap", "round"); line.setAttribute("opacity", "0.8");
  line.setAttribute("marker-end", `url(#${markerId})`);
  svg.appendChild(line);
}

function addMarker(svg, id, color) {
  const ns = "http://www.w3.org/2000/svg";
  const m = document.createElementNS(ns, "marker");
  m.setAttribute("id", id); m.setAttribute("markerWidth", "4");
  m.setAttribute("markerHeight", "4"); m.setAttribute("refX", "2"); m.setAttribute("refY", "2");
  m.setAttribute("orient", "auto");
  const p = document.createElementNS(ns, "path");
  p.setAttribute("d", "M0,0 L4,2 L0,4 Z"); p.setAttribute("fill", color);
  m.appendChild(p); svg.appendChild(m);
}

function drawArrows() {
  const svg = $("arrows");
  svg.innerHTML = "";
  if (!lastAnalysis || !isLivePosition() || game.isGameOver()) return;

  addMarker(svg, "head-best", "#3692e7");
  addMarker(svg, "head-line", "#88bb66");

  const line = lastAnalysis.lines?.[selectedLineIdx];
  if (line?.move) {
    drawArrow(svg, line.move.slice(0, 2), line.move.slice(2, 4), "#88bb66", "head-line", 6);
  }

  if (lastAnalysis.best_move) {
    drawArrow(svg, lastAnalysis.best_move.slice(0, 2), lastAnalysis.best_move.slice(2, 4), "#3692e7", "head-best", 9);
  }
}

function toWhiteCp(cp, turn) {
  return turn === "w" ? cp : -cp;
}

function formatCp(cp) {
  const v = cp / 100;
  if (Math.abs(v) >= 50) return (v > 0 ? "M" : "-M") + Math.round(Math.abs(v) / 100);
  return (v >= 0 ? "+" : "") + v.toFixed(2);
}

function fenTurn(fen) {
  return fen?.split(" ")[1] || game.turn();
}

function setEvalBarPending() {
  $("evalNum").textContent = "…";
}

function setEvalBar(cp, turn) {
  const white_cp = toWhiteCp(cp, turn);
  const pct = 1 / (1 + Math.exp(-white_cp / 250));
  $("evalWhite").style.height = (pct * 100) + "%";
  $("evalNum").textContent = formatCp(white_cp);
  $("evalBar").classList.toggle("untrained", !(serverHealth?.trained));
}

function uciToSan(fen, uci) {
  try {
    const g = new Chess(fen);
    const mv = g.move({ from: uci.slice(0, 2), to: uci.slice(2, 4), promotion: uci[4] });
    return mv ? mv.san : uci;
  } catch { return uci; }
}

function uciLineToSan(fen, uciMoves) {
  try {
    const g = new Chess(fen);
    return uciMoves.map(u => {
      const mv = g.move({ from: u.slice(0, 2), to: u.slice(2, 4), promotion: u[4] });
      return mv ? mv.san : u;
    });
  } catch { return uciMoves; }
}

function renderLines(a, analyzing) {
  const box = $("lines");
  box.innerHTML = "";
  const turn = fenTurn(a?.fen);
  const lines = a?.lines || [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const div = document.createElement("div");
    div.className = "eval-line" + (i === selectedLineIdx ? " selected" : "") + (analyzing ? " dim" : "");
    const cp = formatCp(toWhiteCp(line.eval_cp, turn));
    const moveSan = uciToSan(a?.fen || game.fen(), line.move);
    const pvSan = uciLineToSan(a?.fen || game.fen(), line.pv).join(" ");
    div.innerHTML = `<span class="mv">${moveSan}</span><span class="cp">${cp}</span>
                     <span class="pv">${pvSan}</span>`;
    div.onclick = () => { selectedLineIdx = i; renderLines(a, false); drawArrows(); };
    box.appendChild(div);
  }
}

function updateGameOverUi() {
  if (!game.isGameOver()) return;
  const reason = game.isCheckmate() ? "Checkmate" : game.isStalemate() ? "Stalemate" : "Game over";
  $("status").textContent = reason + " — analysis disabled.";
  lastAnalysis = null;
  $("lines").innerHTML = "";
  $("arrows").innerHTML = "";
}

function scheduleAnalyze() {
  clearTimeout(analyzeTimer);
  analyzeTimer = setTimeout(analyze, ANALYZE_DEBOUNCE_MS);
}

async function analyze() {
  if (game.isGameOver()) {
    updateGameOverUi();
    return;
  }
  const seq = ++analyzeSeq;
  const requestFen = game.fen();
  $("status").textContent = "Analyzing…";
  setEvalBarPending();
  renderLines(lastAnalysis, true);
  $("arrows").innerHTML = "";

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        fen: game.fen(),
        multipv: 5,
        simulations: parseInt($("sims").value, 10) || 200,
      }),
    });
    if (seq !== analyzeSeq) return;
    if (!res.ok) throw new Error(await res.text());
    const a = await res.json();
    if (seq !== analyzeSeq) return;
    if (a.fen !== requestFen) return;

    lastAnalysis = a;
    selectedLineIdx = 0;
    setEvalBar(a.eval_cp, fenTurn(a.fen));
    renderLines(a, false);
    drawArrows();
    const ms = a.elapsed_ms != null ? ` (${a.elapsed_ms} ms)` : "";
    $("status").textContent = `Analysis complete${ms}.`;
  } catch {
    if (seq !== analyzeSeq) return;
    $("status").textContent = "Backend offline? Start: uvicorn server.app:app --port 8000";
    renderLines(null, false);
  }
}

async function refreshHealth() {
  try {
    const res = await fetch("/health");
    serverHealth = await res.json();
    const ck = serverHealth.trained ? serverHealth.checkpoint.split(/[/\\]/).pop() : "untrained net";
    $("footer").textContent =
      `Checkpoint: ${ck} · encoding v${serverHealth.encoding_version}`;
    $("evalBar").classList.toggle("untrained", !serverHealth.trained);
  } catch {
    $("footer").textContent = "Server offline — start uvicorn server.app:app --port 8000";
  }
}

$("flip").onclick = () => { orientation = orientation === "w" ? "b" : "w"; render(); };
$("reset").onclick = initFromStart;
$("prev").onclick = () => goTo(ply - 1);
$("next").onclick = () => goTo(ply + 1);
$("analyze").onclick = () => { clearTimeout(analyzeTimer); analyze(); };
$("loadBtn").onclick = () => {
  try {
    parseImport($("importBox").value);
    $("status").textContent = "Loaded.";
  } catch {
    $("status").textContent = "Could not parse PGN/FEN.";
  }
};

document.addEventListener("keydown", e => {
  if (e.target.matches("textarea, input")) return;
  if (e.key === "ArrowLeft") { e.preventDefault(); goTo(ply - 1); }
  else if (e.key === "ArrowRight") { e.preventDefault(); goTo(ply + 1); }
  else if (e.key === "f" || e.key === "F") { orientation = orientation === "w" ? "b" : "w"; render(); }
  else if (e.key === "a" || e.key === "A") { clearTimeout(analyzeTimer); analyze(); }
});
document.addEventListener("mousemove", onDocumentMouseMove);
document.addEventListener("mouseup", onDocumentMouseUp);

initFromStart();
refreshHealth();
</script>
</body>
</html>
